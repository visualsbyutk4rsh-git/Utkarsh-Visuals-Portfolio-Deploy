<div style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; max-width: 600px; margin: 0 auto; background: #0A0A0F; color: #f8fafc; padding: 40px 32px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
  <div style="height: 3px; background: linear-gradient(90deg, #3B82F6, #06B6D4); border-radius: 3px 3px 0 0; margin: -40px -32px 32px -32px;"></div>
  <div style="text-align: center; margin-bottom: 24px;">
    <span style="font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #3B82F6; font-weight: 700;">Notification Portal</span>
    <h2 style="color: #ffffff; margin: 8px 0 0 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px;">New Lead Acquired</h2>
  </div>
  <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 16px; padding: 24px; margin-bottom: 28px;">
    <table style="width: 100%; border-collapse: collapse;">
      <tr>
        <td style="padding: 10px 0; color: rgba(255, 255, 255, 0.4); font-size: 13px; width: 30%; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">Name</td>
        <td style="padding: 10px 0; color: #ffffff; font-size: 14px; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">{{NAME}}</td>
      </tr>
      <tr>
        <td style="padding: 10px 0; color: rgba(255, 255, 255, 0.4); font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">Email</td>
        <td style="padding: 10px 0; color: #60a5fa; font-size: 14px; font-weight: 500; border-bottom: 1px solid rgba(255, 255, 255, 0.03);"><a href="mailto:{{EMAIL}}" style="color: #60a5fa; text-decoration: none;">{{EMAIL}}</a></td>
      </tr>
      <tr>
        <td style="padding: 10px 0; color: rgba(255, 255, 255, 0.4); font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">Budget Range</td>
        <td style="padding: 10px 0; color: #34d399; font-size: 14px; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">{{BUDGET}}</td>
      </tr>
      <tr>
        <td style="padding: 10px 0; color: rgba(255, 255, 255, 0.4); font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">Origin Source</td>
        <td style="padding: 10px 0; color: #a78bfa; font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">{{SOURCE}}</td>
      </tr>
      <tr>
        <td style="padding: 10px 0; color: rgba(255, 255, 255, 0.4); font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">Captured On</td>
        <td style="padding: 10px 0; color: rgba(255, 255, 255, 0.6); font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.03);">{{DATE}}</td>
      </tr>
    </table>
    <div style="margin-top: 20px;">
      <p style="margin: 0 0 8px 0; color: rgba(255, 255, 255, 0.4); font-size: 13px;">Project Description / Request Details:</p>
      <div style="background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 8px; padding: 16px; color: #cbd5e1; font-size: 13.5px; line-height: 1.6; white-space: pre-wrap;">{{MESSAGE}}</div>
    </div>
  </div>
  <div style="text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px;">
    <p style="color: rgba(255, 255, 255, 0.2); font-size: 11px; margin: 0;">&copy; Utkarsh Visuals Studio Lead System. Encrypted &amp; Secure.</p>
  </div>
</div>
